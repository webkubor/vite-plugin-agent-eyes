name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false
      - run: npm install # 项目未入库 lockfile，用 install 替代 ci
      - run: npm run build
      - run: npm publish # token 认证：NPM_TOKEN secret（复用本地登录 token）
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
