name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write # OIDC 必需
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false
      - run: npm install # 项目未入库 lockfile，用 install 替代 ci
      - run: npm run build
      - run: npm publish # OIDC 自动认证，无需 NODE_AUTH_TOKEN
